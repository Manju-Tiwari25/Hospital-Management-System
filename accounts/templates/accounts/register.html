{% extends 'accounts/base.html' %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card p-4 mt-3">
      <h2 class="mb-3">Create Account</h2>

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="POST" action="{% url 'register' %}">
        {% csrf_token %}

        <h5>Basic Info</h5>

        <div class="mb-2">
          <label>Username *</label><br>
          <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-2">
          <label>First Name</label><br>
          <input type="text" name="first_name" class="form-control">
        </div>

        <div class="mb-2">
          <label>Last Name</label><br>
          <input type="text" name="last_name" class="form-control">
        </div>

        <div class="mb-2">
          <label>Email *</label><br>
          <input type="email" name="email" class="form-control" required>
        </div>

        <div class="mb-2">
          <label>Password *</label><br>
          <input type="password" name="password" class="form-control" required>
        </div>

        <div class="mb-3">
          <label>Confirm Password *</label><br>
          <input type="password" name="confirm_password" class="form-control" required>
        </div>

        <div class="mb-3">
          <label><strong>Register As: *</strong></label><br>
          <select name="role" id="roleSelect" class="form-select" onchange="toggleForms()">
            <option value="patient">Patient</option>
            <option value="doctor">Doctor</option>
          </select>
        </div>

        <!-- Doctor Fields -->
        <div id="doctorFields" style="display:none;">
          <h5>Doctor Details</h5>
          <div class="mb-2">
            <label>Specialization</label><br>
            <input type="text" name="specialization" class="form-control">
          </div>
          <div class="mb-2">
            <label>License Number</label><br>
            <input type="text" name="license_number" class="form-control">
          </div>
          <div class="mb-2">
            <label>Experience (years)</label><br>
            <input type="number" name="experience_years" class="form-control" value="0">
          </div>
          <div class="mb-2">
            <label>Bio</label><br>
            <textarea name="bio" class="form-control" rows="3"></textarea>
          </div>
        </div>

        <!-- Patient Fields -->
        <div id="patientFields">
          <h5>Patient Details</h5>
          <div class="mb-2">
            <label>Date of Birth</label><br>
            <input type="date" name="date_of_birth" class="form-control">
          </div>
          <div class="mb-2">
            <label>Blood Group</label><br>
            <select name="blood_group" class="form-select">
              <option value="">-- Select --</option>
              <option value="A+">A+</option>
              <option value="A-">A-</option>
              <option value="B+">B+</option>
              <option value="B-">B-</option>
              <option value="O+">O+</option>
              <option value="O-">O-</option>
              <option value="AB+">AB+</option>
              <option value="AB-">AB-</option>
            </select>
          </div>
          <div class="mb-2">
            <label>Address</label><br>
            <textarea name="address" class="form-control" rows="3"></textarea>
          </div>
          <div class="mb-2">
            <label>Emergency Contact</label><br>
            <input type="text" name="emergency_contact" class="form-control">
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-3">Register</button>
        <p class="mt-2">Already have an account? <a href="{% url 'login' %}">Login</a></p>

      </form>  <!-- ← form closes HERE, after the button -->
    </div>
  </div>
</div>

<script>
function toggleForms() {
  const role = document.getElementById('roleSelect').value;
  document.getElementById('doctorFields').style.display = role === 'doctor' ? 'block' : 'none';
  document.getElementById('patientFields').style.display = role === 'patient' ? 'block' : 'none';
}
</script>

{% endblock %}
