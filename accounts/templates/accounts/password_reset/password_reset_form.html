{% extends 'accounts/base.html' %}
{% block content %}

<!--
  PAGE: User enters their email address to request a password reset.
  URL:  /password-reset/
-->

<div class="row justify-content-center py-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow border-0 rounded-3">

      <!-- Header -->
      <div class="card-header bg-warning text-dark text-center py-3">
        <h4 class="mb-0">🔑 Reset Your Password</h4>
      </div>

      <div class="card-body p-4">

        <!-- Info message -->
        <div class="alert alert-info py-2 small">
          Enter your registered <strong>email address</strong> below.
          We will send you a password reset link.
        </div>

        <form method="POST">
          {% csrf_token %}

          <div class="mb-4">
            <label class="form-label fw-semibold">
              Email Address <span class="text-danger">*</span>
            </label>
            <input
              type="email"
              name="email"
              class="form-control form-control-lg"
              placeholder="Enter your registered email"
              required
              autofocus
            >
            <div class="form-text text-muted small">
              Enter the email you used when registering.
            </div>
          </div>

          <button type="submit" class="btn btn-warning w-100 btn-lg fw-bold">
             Send Reset Link
          </button>

          <hr class="my-3">

          <div class="text-center">
            <a href="{% url 'login' %}" class="text-decoration-none">
              ← Back to Login
            </a>
          </div>

        </form>
      </div>

    </div>
  </div>
</div>

{% endblock %}
