{% extends 'accounts/base.html' %}
{% block content %}

<div class="row justify-content-center py-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow border-0 rounded-3">

      <div class="card-header bg-primary text-white text-center py-3">
        <h4 class="mb-0">Login</h4>
      </div>

      <div class="card-body p-4">

        {% if messages %}
          {% for m in messages %}
            <div class="alert alert-danger py-2">{{ m }}</div>
          {% endfor %}
        {% endif %}

        <form method="POST" novalidate>
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label fw-semibold">Email or Username</label>
            <input type="text" name="login_input"
                   class="form-control"
                   placeholder="Enter your email or username"
                   value="{{ request.POST.login_input|default:'' }}"
                   required autofocus>
            <div class="form-text text-muted small">
              You can login with your email address or username.
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password"
                   class="form-control"
                   placeholder="Enter your password"
                   required>
          </div>

          <button type="submit" class="btn btn-primary w-100 btn-lg">
            Login →
          </button>

          <hr class="my-3">

          <p class="text-center text-muted small mb-0">
            Don't have an account?
            <a href="{% url 'register' %}" class="fw-bold">Register here</a>
          </p>
        </form>

      </div>
    </div>
  </div>
</div>

{% endblock %}
